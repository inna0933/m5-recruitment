<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M5 工程專案招募與面試追蹤系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">

    <!-- 導覽列 -->
    <nav class="bg-slate-900 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3 cursor-pointer" id="nav-logo" onclick="switchToDashboard()">
                <i class="fa-solid fa-users-gear text-2xl text-blue-400"></i>
                <span class="text-xl font-bold tracking-wide">M5 工程專案招募系統</span>
            </div>
            <div class="flex items-center space-x-4">
                <button id="go-dashboard-btn" onclick="switchToDashboard()" class="hidden inline-flex items-center space-x-2 bg-slate-800 hover:bg-slate-700 text-gray-200 text-sm font-medium py-2 px-4 rounded-lg shadow-sm transition-all cursor-pointer">
                    <i class="fa-solid fa-chart-columns"></i>
                    <span>返回招募看板</span>
                </button>
                <button id="global-resume-btn" onclick="switchToResumes()" class="inline-flex items-center space-x-2 bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-medium py-2 px-4 rounded-lg shadow-sm transition-all cursor-pointer">
                    <i class="fa-solid fa-id-card-clip"></i>
                    <span>人才履歷審查庫</span>
                </button>
                <div class="text-sm bg-slate-800 px-3 py-1.5 rounded-md border border-slate-700 text-gray-300">
                    <i class="fa-solid fa-sync fa-spin mr-2 text-green-400"></i>動態資料已同步
                </div>
            </div>
        </div>
    </nav>

    <!-- 頁面 A：招募看板主首頁 -->
    <div id="page-dashboard" class="block">
        <main class="max-w-7xl mx-auto px-6 py-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500 font-medium">進行中工程專案</p>
                        <h3 class="text-3xl font-bold mt-1 text-slate-800" id="total-projects">0</h3>
                    </div>
                    <div class="p-3 bg-blue-50 text-blue-600 rounded-lg"><i class="fa-solid fa-diagram-project text-xl"></i></div>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500 font-medium">目前總缺額人數</p>
                        <h3 class="text-3xl font-bold mt-1 text-orange-600" id="total-vacancies">0</h3>
                    </div>
                    <div class="p-3 bg-orange-50 text-orange-600 rounded-lg"><i class="fa-solid fa-user-plus text-xl"></i></div>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="px-6 py-5 border-b border-gray-100 bg-slate-50">
                    <h2 class="text-lg font-bold text-slate-800 flex items-center">
                        <i class="fa-solid fa-list-check mr-2 text-blue-500"></i>各專案人力需求與人才媒合動態清單
                    </h2>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-100 text-slate-600 text-sm font-semibold uppercase tracking-wider border-b border-gray-200">
                                <th class="px-6 py-4">專案名稱 / 代碼</th>
                                <th class="px-6 py-4">專案起訖日</th>
                                <th class="px-6 py-4">需求職缺</th>
                                <th class="px-6 py-4 text-center">缺額人數</th>
                                <th class="px-6 py-4">優先度</th>
                                <th class="px-6 py-4">已媒合候選人 (審查庫連動)</th>
                                <th class="px-6 py-4">更新時間</th>
                                <th class="px-6 py-4">備註</th>
                            </tr>
                        </thead>
                        <tbody id="project-list-rows" class="divide-y divide-gray-100 text-sm">
                            <tr><td colspan="8" class="text-center py-8 text-gray-400">資料載入中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- 頁面 B：ATS 人才面試與審查追蹤中心 -->
    <div id="page-resumes" class="hidden">
        <main class="max-w-7xl mx-auto px-6 py-8">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center space-x-3">
                    <i class="fa-solid fa-user-check text-2xl text-emerald-600"></i>
                    <h2 class="text-2xl font-bold text-slate-800">主管面試審查與媒合中心</h2>
                    <span id="resume-count-badge" class="bg-emerald-100 text-emerald-800 text-xs font-bold px-2.5 py-1 rounded-full">0 份履歷</span>
                </div>
                <button onclick="clearAllEvaluations()" class="text-xs bg-gray-200 hover:bg-gray-300 text-gray-600 px-3 py-1.5 rounded-lg transition-colors cursor-pointer">
                    <i class="fa-solid fa-trash-can mr-1"></i>重置本地審查紀錄
                </button>
            </div>
            <div id="resume-cards-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- 卡片載入處 -->
            </div>
        </main>
    </div>

    <script>
        const SPREADSHEET_ID = "1XmfSdZ4lYxZrLvZvO6NBtKTmqm8mWBSN2Fy9Dc-4J2g"; 
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=responseHandler:handleData`;

        let rawSheetRows = []; 

        function switchToDashboard() {
            document.getElementById('page-resumes').style.display = 'none';
            document.getElementById('page-dashboard').style.display = 'block';
            document.getElementById('go-dashboard-btn').style.display = 'none';
            document.getElementById('global-resume-btn').style.display = 'inline-flex';
        }

        function switchToResumes() {
            document.getElementById('page-dashboard').style.display = 'none';
            document.getElementById('page-resumes').style.display = 'block';
            document.getElementById('global-resume-btn').style.display = 'none';
            document.getElementById('go-dashboard-btn').style.display = 'inline-flex';
        }

        function loadSheetData() {
            const script = document.createElement('script');
            script.src = SHEET_URL;
            document.body.appendChild(script);
        }

        window.handleData = function(response) {
            if (!response || !response.table || !response.table.rows) return;
            rawSheetRows = response.table.rows;
            renderSystem();
        };

        function saveEvaluation(candidateIndex, field, value) {
            let storeData = localStorage.getItem('m5_ats_data');
            let atsData = storeData ? JSON.parse(storeData) : {};
            if (!atsData[candidateIndex]) atsData[candidateIndex] = { status: '', manager: '', project: '' };
            atsData[candidateIndex][field] = value;
            localStorage.setItem('m5_ats_data', JSON.stringify(atsData));
            renderSystem();
        }

        function clearAllEvaluations() {
            if (confirm("確定要清空審查紀錄嗎？")) {
                localStorage.removeItem('m5_ats_data');
                renderSystem();
            }
        }

        function renderSystem() {
            const tableBody = document.getElementById("project-list-rows");
            const cardsContainer = document.getElementById("resume-cards-container");
            
            tableBody.innerHTML = ""; 
            cardsContainer.innerHTML = ""; 
            
            let totalProjects = 0; let totalVacancies = 0; let totalResumeLinks = 0;
            let projectList = [];
            let projectMatchMap = {};
            let structuredProjects = []; 

            let storeData = localStorage.getItem('m5_ats_data');
            let savedAts = storeData ? JSON.parse(storeData) : {};

            const cleanStr = (cells, index) => {
                if (index === -1 || !cells || !cells[index]) return "";
                let cell = cells[index];
                let val = (cell.f !== null && cell.f !== undefined) ? cell.f : cell.v;
                return val !== null && val !== undefined ? String(val).replace(/[\r\n]+/g, " ").trim() : "";
            };

            // 🌟 核心變更：映射清單全數對接中文「備註」
            let colMap = { id: 0, name: 1, title: 2, vacancies: 3, priority: 4, update: 5, note: 6, duration: 7, cName: 10, cLink: 11 };
            
            if (rawSheetRows.length > 0 && rawSheetRows[0].c) {
                const headCells = rawSheetRows[0].c;
                headCells.forEach((cell, idx) => {
                    if (!cell || cell.v === null) return;
                    const txt = String(cell.v).trim().toLowerCase();
                    
                    if (txt === "id") colMap.id = idx;
                    if (txt === "projectname") colMap.name = idx;
                    if (txt === "jobtitle") colMap.title = idx;
                    if (txt === "vacancies") colMap.vacancies = idx;
                    if (txt === "priority") colMap.priority = idx;
                    if (txt === "updatedat") colMap.update = idx;
                    // 🌟 網頁後台綁定：現在會直接辨識 Excel 第一列打的中文「備註」
                    if (txt === "備註" || txt === "resumelink" || txt === "note" || txt === "remark") colMap.note = idx;
                    if (txt === "projectduration") colMap.duration = idx;
                    if (txt === "cname" || txt === "求職者姓名" || txt === "姓名") colMap.cName = idx;
                    if (txt === "clink" || txt === "履歷網址" || txt === "履歷連結") colMap.cLink = idx;
                });
            }

            // 第一輪：收集、對照
            rawSheetRows.forEach((row, rowIndex) => {
                const cells = row.c; if (!cells) return;

                const projectName = cleanStr(cells, colMap.name);
                const candidateName = cleanStr(cells, colMap.cName); 

                if (projectName && projectName.toLowerCase() !== "projectname") {
                    if (!projectList.includes(projectName)) {
                        projectList.push(projectName);
                    }
                    
                    structuredProjects.push({
                        rowIndex: rowIndex,
                        id: cleanStr(cells, colMap.id),
                        projectName: projectName,
                        jobTitle: cleanStr(cells, colMap.title),
                        vacanciesVal: cleanStr(cells, colMap.vacancies) || "0",
                        priority: cleanStr(cells, colMap.priority),
                        updatedAt: cleanStr(cells, colMap.update),
                        noteText: cleanStr(cells, colMap.note), 
                        projectDuration: cleanStr(cells, colMap.duration)
                    });
                }

                const record = savedAts[rowIndex];
                if (candidateName && record && record.project && (record.status === '符合(待邀約)' || record.status === '符合(待核薪)')) {
                    if (!projectMatchMap[record.project]) projectMatchMap[record.project] = [];
                    projectMatchMap[record.project].push({ name: candidateName, tag: record.status === '符合(待邀約)' ? '待邀' : '待核' });
                }
            });

            // 按專案名稱排序
            structuredProjects.sort((a, b) => a.projectName.localeCompare(b.projectName, 'zh-Hans-TW'));

            // 第二輪：繪製主表格
            structuredProjects.forEach(proj => {
                totalProjects++;
                const vacancies = parseInt(proj.vacanciesVal, 10) || 0; totalVacancies += vacancies;

                let priorityClass = "bg-gray-100 text-gray-700";
                if (proj.priority === "緊急") priorityClass = "bg-red-100 text-red-700 font-bold";
                else if (proj.priority === "高") priorityClass = "bg-orange-100 text-orange-700";
                else if (proj.priority === "急") priorityClass = "bg-amber-100 text-amber-700 font-medium";
                else if (proj.priority === "中") priorityClass = "bg-blue-100 text-blue-700";

                let matchedTalentsHTML = `<span class="text-gray-400 text-xs">—</span>`;
                if (projectMatchMap[proj.projectName] && projectMatchMap[proj.projectName].length > 0) {
                    matchedTalentsHTML = `<div class="flex flex-wrap gap-1.5">`;
                    projectMatchMap[proj.projectName].forEach(t => {
                        const c = t.tag === '待邀' ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : 'bg-blue-50 text-blue-700 border-blue-200';
                        matchedTalentsHTML += `<span class="inline-flex items-center text-xs px-2 py-0.5 rounded-md border ${c} font-medium"><i class="fa-solid fa-user mr-1 text-[10px]"></i>${t.name}<span class="opacity-60 text-[10px] ml-1 font-normal">(${t.tag})</span></span>`;
                    });
                    matchedTalentsHTML += `</div>`;
                }

                const rowHTML = `
                    <tr class="hover:bg-slate-50/80 transition-colors">
                        <td class="px-6 py-4 font-medium text-slate-900"><div class="font-semibold">${proj.projectName}</div><div class="text-xs text-gray-400 mt-0.5">${proj.id || '-'}</div></td>
                        <td class="px-6 py-4 text-gray-500 text-xs">${proj.projectDuration || '-'}</td>
                        <td class="px-6 py-4 text-gray-600 font-medium">${proj.jobTitle || '-'}</td>
                        <td class="px-6 py-4 text-center"><span class="text-base font-bold px-2.5 py-1 rounded-full ${vacancies > 3 ? 'text-red-600 bg-red-50' : 'text-slate-700'}">${vacancies} 名</span></td>
                        <td class="px-6 py-4"><span class="text-xs px-2.5 py-1 rounded-md ${priorityClass}">${proj.priority || '普通'}</span></td>
                        <td class="px-6 py-4">${matchedTalentsHTML}</td>
                        <td class="px-6 py-4 text-gray-400 text-xs">${proj.updatedAt || '-'}</td>
                        <td class="px-6 py-4 text-gray-600 max-w-xs truncate font-normal">${proj.noteText || '<span class="text-gray-300">—</span>'}</td>
                    </tr>
                `;
                tableBody.insertAdjacentHTML("beforeend", rowHTML);
            });

            // 第三輪：繪製人才審查字卡牆
            rawSheetRows.forEach((row, rowIndex) => {
                const cells = row.c; if (!cells) return;

                const candidateName = cleanStr(cells, colMap.cName); 
                const candidateLink = cleanStr(cells, colMap.cLink); 

                if (candidateName && candidateName.toLowerCase() !== "cname" && candidateName !== "求職者姓名" && candidateName !== "姓名" && candidateLink && candidateLink.startsWith('http')) {
                    totalResumeLinks++;
                    const record = savedAts[rowIndex] || { status: '', manager: '', project: '' };

                    projectList.sort((a, b) => a.localeCompare(b, 'zh-Hans-TW'));

                    let projectOptions = `<option value="">-- 請選擇指派工程專案 --</option>`;
                    projectList.forEach(p => {
                        projectOptions += `<option value="${p}" ${record.project === p ? 'selected' : ''}>${p}</option>`;
                    });

                    const firstChar = candidateName.charAt(0);
                    const cardHTML = `
                        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 hover:shadow-md transition-all flex flex-col justify-between">
                            <div>
                                <div class="flex items-center space-x-3 mb-4">
                                    <div class="w-11 h-11 bg-gradient-to-tr from-emerald-500 to-teal-600 text-white font-bold text-base rounded-full flex items-center justify-center shadow-inner">${firstChar}</div>
                                    <div>
                                        <h4 class="text-base font-bold text-slate-800">${candidateName}</h4>
                                        <a href="${candidateLink}" target="_blank" class="text-xs text-blue-500 hover:text-blue-600 font-medium inline-flex items-center mt-0.5"><i class="fa-regular fa-file-lines mr-1"></i>點擊查閱原始履歷 ↗</a>
                                    </div>
                                </div>
                                <div class="bg-slate-50 p-3 rounded-xl mb-3 border border-gray-100">
                                    <span class="text-xs text-gray-400 block mb-2 font-medium"><i class="fa-solid fa-circle-check mr-1 text-slate-400"></i>主管初步評估結果：</span>
                                    <div class="flex flex-col space-y-1.5 text-xs">
                                        <label class="flex items-center space-x-2 cursor-pointer font-medium text-slate-700">
                                            <input type="radio" name="status-${rowIndex}" value="符合(待邀約)" onchange="saveEvaluation(${rowIndex}, 'status', this.value)" ${record.status === '符合(待邀約)' ? 'checked' : ''} class="w-3.5 h-3.5 text-emerald-600 accent-emerald-600">
                                            <span class="text-emerald-700 bg-emerald-50 px-1.5 py-0.5 rounded">符合 (待邀約)</span>
                                        </label>
                                        <label class="flex items-center space-x-2 cursor-pointer font-medium text-slate-700">
                                            <input type="radio" name="status-${rowIndex}" value="符合(待核薪)" onchange="saveEvaluation(${rowIndex}, 'status', this.value)" ${record.status === '符合(待核薪)' ? 'checked' : ''} class="w-3.5 h-3.5 text-blue-600 accent-blue-600">
                                            <span class="text-blue-700 bg-blue-50 px-1.5 py-0.5 rounded">符合 (待核薪)</span>
                                        </label>
                                        <label class="flex items-center space-x-2 cursor-pointer font-medium text-slate-700">
                                            <input type="radio" name="status-${rowIndex}" value="不符合" onchange="saveEvaluation(${rowIndex}, 'status', this.value)" ${record.status === '不符合' ? 'checked' : ''} class="w-3.5 h-3.5 text-red-600 accent-red-600">
                                            <span class="text-red-600 bg-red-50 px-1.5 py-0.5 rounded">不符合</span>
                                        </label>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="text-xs text-gray-400 block mb-1 font-medium">預計擬派工程專案：</label>
                                    <select onchange="saveEvaluation(${rowIndex}, 'project', this.value)" class="w-full text-xs bg-white border border-gray-200 rounded-lg p-2 text-slate-700 focus:border-emerald-500 focus:outline-none shadow-sm">
                                        ${projectOptions}
                                    </select>
                                </div>
                                <div>
                                    <label class="text-xs text-gray-400 block mb-1 font-medium">審查主管簽名：</label>
                                    <input type="text" placeholder="請輸入您的姓名..." value="${record.manager || ''}" onchange="saveEvaluation(${rowIndex}, 'manager', this.value)" class="w-full text-xs bg-white border border-gray-200 rounded-lg p-2 text-slate-700 focus:border-emerald-500 focus:outline-none shadow-sm font-medium">
                                </div>
                            </div>
                        </div>
                    `;
                    cardsContainer.insertAdjacentHTML("beforeend", cardHTML);
                }
            });

            document.getElementById("total-projects").innerText = totalProjects;
            document.getElementById("total-vacancies").innerText = totalVacancies;
            document.getElementById("resume-count-badge").innerText = `${totalResumeLinks} 份履歷資料`;

            if (totalResumeLinks === 0) {
                cardsContainer.innerHTML = `<div class="col-span-full text-center py-12 text-gray-400 bg-white rounded-xl border border-dashed border-gray-200">目前沒有任何履歷名單。</div>`;
            }
        }

        document.addEventListener("DOMContentLoaded", () => { loadSheetData(); });
    </script>
</body>
</html>
